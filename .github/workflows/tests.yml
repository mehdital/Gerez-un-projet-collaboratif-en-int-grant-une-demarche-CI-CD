name: Tests

on:
  # Analyse qualité des PR
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Back-end tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Lancer tests back + rapport JaCoCo
        working-directory: back
        run: mvn -B clean verify

      - name: Publier les rapports back (tests + couverture)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: back-test-reports
          path: |
            back/target/surefire-reports/**
            back/target/site/jacoco/**
          if-no-files-found: warn

  frontend-tests:
    name: Front-end tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer Chrome (headless pour Karma)
        uses: browser-actions/setup-chrome@v1

      - name: Exporter CHROME_BIN pour Karma
        run: echo "CHROME_BIN=$(which chrome || which google-chrome || which chromium-browser)" >> $GITHUB_ENV

      - name: Installer dépendances front
        working-directory: front
        run: npm ci

      - name: Lancer tests Angular + couverture
        # Le launcher ChromeHeadlessCI sera ajouté dans karma.conf.js
        working-directory: front
        run: npx ng test --watch=false --code-coverage --browsers=ChromeHeadless

      - name: Publier les rapports front (coverage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: front-coverage
          path: front/coverage/**
          if-no-files-found: warn