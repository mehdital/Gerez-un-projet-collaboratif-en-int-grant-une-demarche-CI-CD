name: Tests

on:
  # Analyse qualité des PR
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Back-end tests
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 11
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Lancer tests back + rapport JaCoCo
        working-directory: back
        run: mvn -B clean verify

      - name: Publier les rapports back (tests + couverture)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: back-test-reports
          path: |
            back/target/surefire-reports/**
            back/target/site/jacoco/**
          if-no-files-found: warn

  frontend-tests:
    name: Front-end tests
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Nodejs
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer Chrome (headless pour Karma)
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce

      - name: Exporter CHROME_BIN pour Karma
        run: echo "CHROME_BIN=$(which chrome || which google-chrome || which chromium-browser)" >> $GITHUB_ENV

      - name: Installer dépendances front
        working-directory: front
        run: npm ci

      - name: Lancer tests Angular + couverture
        # Le launcher ChromeHeadlessCI sera ajouté dans karma.conf.js
        working-directory: front
        run: npx ng test --watch=false --code-coverage --browsers=ChromeHeadlessCI

      - name: Publier les rapports front (coverage)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: front-coverage
          path: front/coverage/**
          if-no-files-found: warn
